<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Brasil Antenado</title>
  <style>
    body{margin:0;width:280px;padding:16px;font-family:Arial,Helvetica,sans-serif;background:#f6f8fb;color:#162033}
    .card{background:#fff;border:1px solid #dbe2ea;border-radius:14px;padding:14px}
    h1{font-size:16px;margin:0 0 8px}
    p{font-size:13px;line-height:1.4;color:#5b667a;margin:0 0 12px}
    button{width:100%;border:1px solid #cdd8ea;background:#2f6df6;color:#fff;padding:10px 12px;border-radius:10px;font-weight:700;cursor:pointer}
    button[disabled]{background:#c9d5f2;border-color:#c9d5f2;cursor:not-allowed}
    .hint{margin-top:10px;font-size:12px;color:#6b7280}
  </style>
</head>
<body>
  <div class="card">
    <h1>Brasil Antenado</h1>
    <p id="status">Abra o Blip Desk para usar.</p>
    <button id="openSidePanel" disabled>Abrir painel</button>
    <div class="hint">Esta extensão usa apenas o painel lateral do Desk.</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
